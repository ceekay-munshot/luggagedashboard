// ── Firecrawl scrape a single URL → full markdown ──────────────────────────
async function firecrawlScrape(url) {
  const res = await fetch('https://api.firecrawl.dev/v1/scrape', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + FC_KEY },
    body: JSON.stringify({ url, formats: ['markdown'], onlyMainContent: false }),
    signal: AbortSignal.timeout(60000),
  });
  if (!res.ok) {
    const txt = await res.text().catch(() => '');
    throw new Error('Firecrawl scrape HTTP ' + res.status + ': ' + txt.slice(0,120));
  }
  const data = await res.json();
  if (!data.success) throw new Error('Firecrawl scrape error: ' + JSON.stringify(data).slice(0,120));
  return { markdown: data.data?.markdown || '', url };
}

// ── Parse SKUs from a scraped listing page ─────────────────────────────────
//
// REAL Firecrawl markdown structures observed:
//
// FLIPKART — each product has 3 links in sequence:
//   [![img](https://rukminim2.flixcart.com/.../suitcase.jpeg)](https://flipkart.com/.../p/itm...?pid=XXXXX)
//   [79% off](https://flipkart.com/.../p/itm...?pid=XXXXX)
//   [Large Check-in Suitcase (75 cm) 4 Wheels - Eclipse Neo...](https://flipkart.com/.../p/itm...?pid=XXXXX)
//   ₹2,849
//   ~~₹14,170~~
//
// AMAZON — each product has this pattern:
//   [Safari Stratos 8 Wheels...](https://amazon.in/.../dp/B097GJXPXP/ref=sr_1_36?...)
//   M.R.P:₹30,997₹30,997(https://amazon.in/.../dp/B097GJXPXP/ref=sr_1_36?...)
//   ₹6,349
//   (75% off)
//
// RULES FOR VALID PRODUCT NAME LINK:
//   ✅ Text is ≥ 20 chars, contains brand name, has no image extensions or raw URLs
//   ❌ Text contains image URL (rukminim, .jpeg, .jpg, .png, .webp)
//   ❌ Text matches "XX% off" pattern
//   ❌ Text starts with M.R.P or contains "₹" (it's a price, not a name)
//   ❌ Text contains "http" (raw URL leaked into name)
// ─────────────────────────────────────────────────────────────────────────────
function parseSKUsFromPage(markdown, pageUrl, brand, company) {
  const skus      = [];
  const isAmazon  = pageUrl.includes('amazon');
  const platform  = isAmazon ? 'Amazon' : 'Flipkart';
  const brandLow  = brand.toLowerCase();

  function toNum(s) { return parseInt(String(s).replace(/[^\d]/g, ''), 10); }

  // ── Step 1: Find ALL markdown links in the page ───────────────────────────
  // Capture: [text](url) — greedy on url to handle nested parens in Amazon URLs
  const linkRe = /\[([^\]]{1,300})\]\((https?:\/\/(?:www\.)?(?:amazon\.in|flipkart\.com)[^)]{10,500})\)/g;
  let m;
  const rawLinks = [];
  while ((m = linkRe.exec(markdown)) !== null) {
    rawLinks.push({ text: m[1], url: m[2], pos: m.index });
  }

  // ── Step 2: Filter to PRODUCT NAME links only ─────────────────────────────
  function isProductNameLink(text, url) {
    const t   = text.trim();
    const uLow = url.toLowerCase();
    // Must be a reasonable length for a product title
    if (t.length < 15 || t.length > 250) return false;
    // Must NOT be an image link (img alt text or image CDN URL)
    if (/rukminim|flixcart\.com\/image|\.jpeg|\.jpg|\.png|\.webp/i.test(t)) return false;
    if (/rukminim|\.jpeg|\.jpg|\.png|\.webp/i.test(url)) return false;
    // Must NOT be a discount badge like "79% off" or "83% off"
    if (/^\d{1,2}%\s*off$/i.test(t)) return false;
    if (/^[\d,\s₹%-]+$/.test(t)) return false;
    // Must NOT start with M.R.P
    if (/^M\.?R\.?P/i.test(t)) return false;
    // Must NOT contain raw http (URL leaked into name)
    if (/https?:\/\//i.test(t)) return false;
    // Must NOT contain ₹ (it's a price line)
    if (/[₹\u20b9]/.test(t)) return false;
    // Must NOT be navigation items
    if (/^(home|shop|men|women|kids|bags|luggage|filter|sort|all|see more|next|prev)/i.test(t)) return false;
    // Brand check: EITHER the link text OR the URL path must mention the brand
    // (Flipkart product names don't always start with the brand name)
    const brandInText = t.toLowerCase().includes(brandLow);
    const brandInUrl  = uLow.includes(brandLow) || uLow.includes(brandLow.replace(/ /g,'-'));
    if (!brandInText && !brandInUrl) return false;
    return true;
  }

  const productLinks = rawLinks.filter(l => isProductNameLink(l.text, l.url));

  // ── Step 3: For each product link, find MRP + selling from nearby text ────
  const seen = new Set();

  for (let li = 0; li < productLinks.length; li++) {
    const { text: rawName, url: productUrl, pos } = productLinks[li];

    // Price block = from this product name link to the next product name link.
    // Use 900 chars max — wide enough for Flipkart where prices come AFTER
    // the name link but BEFORE the next product's image link.
    const nextPos = productLinks[li + 1]?.pos ?? (pos + 900);
    const block = markdown.slice(pos, Math.min(pos + 900, nextPos));

    // ── EXTRACT MRP ────────────────────────────────────────────────────────
    // Amazon pattern: "M.R.P:₹30,997₹30,997(https://..." → first number is MRP
    // Flipkart pattern: "~~₹14,170~~"
    let mrp = null;

    // Amazon: M.R.P line — extract FIRST number after "M.R.P:"
    const mrpLineMatch = block.match(/M\.?R\.?P\.?\s*:?\s*[₹\u20b9Rs\s]*([\d,]+)/i);
    if (mrpLineMatch) mrp = toNum(mrpLineMatch[1]);

    // Flipkart: strikethrough ~~₹X~~
    if (!mrp) {
      const strikeMatch = block.match(/~~\s*[₹\u20b9Rs\s]*([\d,]+)\s*~~/);
      if (strikeMatch) mrp = toNum(strikeMatch[1]);
    }

    // ── EXTRACT STATED DISCOUNT % ──────────────────────────────────────────
    let statedDisc = null;
    const discMatch = block.match(/\(?\s*(\d{1,2})\s*%\s*off\s*\)?/i);
    if (discMatch) statedDisc = parseInt(discMatch[1], 10);

    // ── EXTRACT SELLING PRICE CANDIDATES ──────────────────────────────────
    // Strip: (1) entire M.R.P line, (2) strikethrough blocks, (3) markdown
    // links like (https://...) that contain duplicate price numbers
    const blockClean = block
      .replace(/M\.?R\.?P[^\n]*/gi, '')          // remove M.R.P: line entirely
      .replace(/~~[^~]+~~/g, '')                  // remove ~~strikethrough~~
      .replace(/\(https?:\/\/[^)]{0,400}\)/g, '') // remove (https://url) fragments
      .replace(/\[([^\]]*)\]\([^)]*\)/g, '$1');   // collapse [text](url) → text only

    const rawPrices = [...blockClean.matchAll(/[₹\u20b9]\s*([\d,]+)/g)]
      .map(mx => toNum(mx[1]))
      .filter(v => v >= 300 && v <= 100000);

    let selling = null;

    // PRIORITY 1: MRP + statedDisc → derive selling, cross-check against real prices
    if (mrp && mrp >= 300 && statedDisc && statedDisc >= 5 && statedDisc <= 92) {
      const derived = Math.round(mrp * (1 - statedDisc / 100));
      // Find the closest real price on the page to our derived value
      let closest = null, closestDiff = Infinity;
      for (const p of rawPrices) {
        if (p >= mrp) continue;
        const diff = Math.abs(p - derived);
        if (diff < closestDiff) { closestDiff = diff; closest = p; }
      }
      if (closest) {
        // Check: does the real price produce a discount close to stated? (within 12pp)
        const realDisc = Math.round((mrp - closest) / mrp * 100);
        if (Math.abs(realDisc - statedDisc) <= 12) {
          selling = closest; // real price matches stated discount → use it
        } else {
          // Real price doesn't validate — use derived value as best estimate
          selling = derived;
        }
      } else {
        selling = derived; // no real prices found → use derived
      }
    }

    // PRIORITY 2: MRP known, no disc% → smallest price below MRP
    if (mrp && mrp >= 300 && !selling) {
      const cands = rawPrices.filter(p => p < mrp && p >= 300);
      if (cands.length) selling = Math.min(...cands);
    }

    // PRIORITY 3: No MRP label → validate price pair against stated discount
    if (!mrp && statedDisc && statedDisc >= 5 && statedDisc <= 92) {
      const allPrices = [...blockClean.matchAll(/[₹\u20b9]\s*([\d,]+)/g)]
        .map(mx => toNum(mx[1])).filter(v => v >= 300 && v <= 100000);
      const uniq = [...new Set(allPrices)].sort((a, b) => a - b);
      for (let a = 0; a < uniq.length && !mrp; a++) {
        for (let b2 = a + 1; b2 < uniq.length && !mrp; b2++) {
          const lo = uniq[a], hi = uniq[b2];
          const calc = Math.round((hi - lo) / hi * 100);
          if (Math.abs(calc - statedDisc) <= 5) { selling = lo; mrp = hi; }
        }
      }
    }

    // ── VALIDATE ──────────────────────────────────────────────────────────
    if (!mrp || !selling) continue;
    if (mrp <= selling || selling < 300 || mrp > 100000) continue;
    const discount = +((mrp - selling) / mrp * 100).toFixed(1);
    if (discount < 5 || discount > 92) continue;
    // If stated discount exists, computed must match within 10pp
    if (statedDisc && Math.abs(discount - statedDisc) > 10) continue;

    // Clean product name
    const name = rawName.replace(/[*_#\[\]!]/g, '').trim().slice(0, 130);

    // De-duplicate by (name prefix + mrp + selling)
    const dedupeKey = name.slice(0, 35) + mrp + selling;
    if (seen.has(dedupeKey)) continue;
    seen.add(dedupeKey);

    const tier = mrp < 2000 ? '<₹2k' : mrp < 6000 ? '₹2–6k' : '>₹6k';
    const isProductPage = productUrl.includes('/dp/') || productUrl.includes('/p/') ||
                          productUrl.includes('pid=') || productUrl.includes('/product/');

    skus.push({ brand, company, name, mrp, selling, discount,
                platform, tier, url: productUrl, isProductPage, isLive: true });
  }

  return skus;
}

// ── Main entry point: scrape all listing pages for a brand ─────────────────
async function fetchBrandPrices(brand, company) {
  const pages = LISTING_PAGES[brand] || [];
  if (!pages.length) throw new Error('No listing pages configured for ' + brand);

  // Scrape all pages in parallel
  const settled = await Promise.allSettled(pages.map(url => firecrawlScrape(url)));

  let allSkus = [];
  let lastErr = '';

  for (const result of settled) {
    if (result.status === 'rejected') {
      lastErr = result.reason?.message || 'scrape failed';
      continue;
    }
    const { markdown, url } = result.value;
    if (!markdown || markdown.length < 200) continue;
    const skus = parseSKUsFromPage(markdown, url, brand, company);
    allSkus.push(...skus);
  }

  // De-duplicate across pages by (mrp+selling+name prefix)
  const seen = new Set();
  allSkus = allSkus.filter(s => {
    const k = s.name.slice(0,30) + s.mrp + s.selling;
    if (seen.has(k)) return false;
    seen.add(k); return true;
  });

  if (allSkus.length === 0) throw new Error(lastErr || 'No valid SKUs parsed from listing pages for ' + brand);
  return allSkus;
}

// ─────────────────────────────────────────────────────────────────────────────
// MARKET INSIGHT — real data-driven analysis, one paragraph per company
// ─────────────────────────────────────────────────────────────────────────────
function fetchInsight(companyStats) {
  const lines = companyStats.map(c => {
    const avg    = c.avg;
    const spread = +((c.max - c.min).toFixed(1));  // rounded to avoid float artifacts
    const skus   = c.count;
    const name   = c.company;
    const short  = name.split(' ')[0]; // VIP / Safari / Samsonite

    // Intensity label
    const intensity = avg > 60 ? 'deep' : avg > 40 ? 'heavy' : avg > 25 ? 'moderate' : 'light';

    // Spread interpretation — plain language, no jargon
    const spreadNote = spread > 40
      ? `Discounts range widely from ${c.min}% to ${c.max}% (a ${spread}-point gap), suggesting a mixed portfolio spanning both entry-level clearance and premium segment pressure.`
      : spread > 20
      ? `Discounts range from ${c.min}% to ${c.max}% (a ${spread}-point spread), suggesting selective discounting across different price tiers.`
      : `Discounts are tightly clustered between ${c.min}% and ${c.max}% (a ${spread}-point range), pointing to uniform pricing behaviour across the portfolio.`;

    // Margin signal
    const marginSignal = avg > 60
      ? `At these levels, gross margin dilution is material and likely reflects either channel stuffing, excess inventory, or aggressive market-share defence.`
      : avg > 40
      ? `This level of discounting compresses realised margins and raises questions about demand velocity at full price.`
      : avg > 25
      ? `Discounts are elevated but within a range consistent with normal promotional activity in the Indian luggage market.`
      : `${short} appears to be holding price discipline, which is constructive for near-term margin preservation.`;

    // Investor signal
    const investorNote = avg > 55
      ? `Investors should watch channel inventory data and monitor whether discounts persist into the next quarter as a leading indicator of top-line stress.`
      : avg > 35
      ? `Worth monitoring whether the discount intensity moderates post-season, which would signal a return to pricing power.`
      : `Current pricing posture supports a stable gross margin trajectory — a positive signal for earnings visibility.`;

    return `${name} — avg ${avg}% off across ${skus} live SKUs. ${spreadNote} ${marginSignal} ${investorNote}`;
  });
  return lines.join('\n\n');
}

// ─────────────────────────────────────────────────────────────────────────────
// STATS
// ─────────────────────────────────────────────────────────────────────────────
function calcStats(arr) {
  if (!arr.length) return {avg:0,median:0,min:0,max:0,p25:0,p75:0,count:0};
  const s = [...arr].sort((a,b)=>a-b);
  const mid = s.length / 2;
  const median = s.length % 2 === 0 ? (s[mid - 1] + s[mid]) / 2 : s[Math.floor(mid)];
  return {
    avg:    +(arr.reduce((a,v)=>a+v,0)/arr.length).toFixed(1),
    median: +median.toFixed(1),
    min:    +s[0].toFixed(1),
    max:    +s[s.length-1].toFixed(1),
    p25:    +s[Math.floor(s.length*.25)].toFixed(1),
    p75:    +s[Math.floor(s.length*.75)].toFixed(1),
    count:  arr.length
  };
}

function buildStats(skus) {
  const co={}, br={};
  skus.forEach(sku => {
    const {brand,company,discount,platform,tier} = sku;
    if (!co[company]) co[company]={discs:[],tiers:{},skus:[]};
    co[company].discs.push(discount); co[company].skus.push(sku);
    co[company].tiers[tier]=co[company].tiers[tier]||[]; co[company].tiers[tier].push(discount);
    if (!br[brand]) br[brand]={discs:[],company,plt:{},skus:[]};
    br[brand].discs.push(discount); br[brand].skus.push(sku);
    br[brand].plt[platform]=(br[brand].plt[platform]||0)+1;
  });
  const companyStats = Object.entries(co).map(([company,{discs,tiers,skus}])=>({
    company,...calcStats(discs),skus,
    tierAvg: Object.fromEntries(Object.entries(tiers).map(([t,a])=>[t,+(a.reduce((x,v)=>x+v,0)/a.length).toFixed(1)]))
  })).sort((a,b)=>b.avg-a.avg);
  const brandStats = Object.entries(br).map(([brand,{discs,company,plt,skus}])=>({
    brand,company,...calcStats(discs),skus,
    amazon:plt["Amazon"]||0, flipkart:plt["Flipkart"]||0
  })).sort((a,b)=>b.avg-a.avg);
  return {companyStats,brandStats};
}

function deltaBadge(v) {
  if (v===null||v===undefined) return '';
  const big=Math.abs(v)>5, up=v>0;
  const bg=big?(up?'#FCEBEB':'#EAF3DE'):'#f7f6f3';
  const col=big?(up?'#A32D2D':'#3B6D11'):'#5f5e5a';
  return `<span class="delta-badge" style="background:${bg};color:${col}">${up?'+':''}${v.toFixed(1)} pts${big?(up?' ↑':' ↓'):''}</span>`;
}

function boxStrip(p25,p75,min,max,avg,median,color) {
  return `<div style="position:relative;height:22px;margin:8px 0">
    <div style="position:absolute;left:0;right:0;top:50%;height:1.5px;background:rgba(26,26,24,0.1);transform:translateY(-50%)"></div>
    <div style="position:absolute;left:${min}%;width:1.5px;height:11px;background:${color};top:50%;transform:translateY(-50%)"></div>
    <div style="position:absolute;left:${max}%;width:1.5px;height:11px;background:${color};top:50%;transform:translateY(-50%)"></div>
    <div style="position:absolute;left:${p25}%;width:${p75-p25}%;height:13px;background:${color};opacity:.3;top:50%;transform:translateY(-50%);border-radius:3px"></div>
    <div style="position:absolute;left:${median}%;width:2.5px;height:18px;background:${color};top:50%;transform:translateX(-50%) translateY(-50%);border-radius:1px"></div>
    <div style="position:absolute;left:${avg}%;width:9px;height:9px;background:${color};top:50%;transform:translateX(-50%) translateY(-50%);border-radius:50%;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.15)"></div>
  </div>`;
}

function renderInsight(text) {
  if (!text) return `<div style="color:#9b9a96;font-size:13px">Market read will appear after first refresh.</div>`;
  const companies = [
    {words:["VIP Group","VIP —","VIP's"],col:COL["VIP Group"],bg:BG["VIP Group"],txt:TXT["VIP Group"]},
    {words:["Safari Industries","Safari —","Safari's"],col:COL["Safari Industries"],bg:BG["Safari Industries"],txt:TXT["Safari Industries"]},
    {words:["Samsonite Group","Samsonite —","Samsonite's","American Tourister"],col:COL["Samsonite Group"],bg:BG["Samsonite Group"],txt:TXT["Samsonite Group"]},
    {words:["HRX —","HRX's","HRX by"],col:COL["HRX"],bg:BG["HRX"],txt:TXT["HRX"]},
    {words:["Uppercase —","Uppercase's"],col:COL["Uppercase"],bg:BG["Uppercase"],txt:TXT["Uppercase"]},
    {words:["Nasher Miles —","Nasher Miles'","Nasher —"],col:COL["Nasher Miles"],bg:BG["Nasher Miles"],txt:TXT["Nasher Miles"]},
  ];
  // Split by double newline (one paragraph per company) — NOT by sentence
  const paragraphs = text.split(/\n\n+/).map(p => p.trim()).filter(Boolean);
  return paragraphs.map(para => {
    let dom = null, best = Infinity;
    companies.forEach(c => c.words.forEach(w => {
      const i = para.indexOf(w);
      if (i !== -1 && i < best) { best = i; dom = c; }
    }));
    return `<div class="insight-sentence" style="background:${dom?dom.bg:'#f7f6f3'};border-left-color:${dom?dom.col:'rgba(26,26,24,0.12)'}">
      <p style="margin:0;font-size:13px;line-height:1.8;color:${dom?dom.txt:'#1a1a18'}">${para}</p>
    </div>`;
  }).join('');
}

// ─────────────────────────────────────────────────────────────────────────────
// MAIN REFRESH
// ─────────────────────────────────────────────────────────────────────────────
async function doRefresh() {
  if (STATE.running) return;

  STATE.running = true;
  STATE.curr = null;
  STATE.view = null;
  STATE.insight = '';
  STATE.steps = BRANDS.map(b=>({brand:b.brand,company:b.company,status:'pending',count:0,error:''}));
  render();

  let allSkus = [];

  for (let i=0; i<BRANDS.length; i++) {
    const {brand,company} = BRANDS[i];
    STATE.steps[i].status = 'loading';
    render();

    let skus=[], lastErr='';
    for (let attempt=0; attempt<2; attempt++) {
      try {
        skus = await fetchBrandPrices(brand, company);
        if (skus.length < 1) throw new Error('No valid SKUs found for ' + brand);
        break;
      } catch(e) {
        lastErr = e.message.slice(0, 120);
        if (attempt===0) await new Promise(r=>setTimeout(r,3000));
      }
    }

    if (skus.length >= 1) {
      allSkus.push(...skus);
      STATE.steps[i].status = 'done';
      STATE.steps[i].count  = skus.length;
    } else {
      STATE.steps[i].status = 'error';
      STATE.steps[i].error  = lastErr;
    }
    render();
  }

  const goodBrands = STATE.steps.filter(s=>s.status==='done').length;
  if (goodBrands < 1) {
    STATE.running = false;
    render();
    return;
  }

  const stats = buildStats(allSkus);
  const now   = new Date();
  const snap  = {
    ts: now,
    label: now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'}),
    stats, skuCount: allSkus.length,
    vip:    stats.companyStats.find(c=>c.company==='VIP Group')?.avg,
    safari: stats.companyStats.find(c=>c.company==='Safari Industries')?.avg,
    sam:    stats.companyStats.find(c=>c.company==='Samsonite Group')?.avg,
    hrx:    stats.companyStats.find(c=>c.company==='HRX')?.avg,
    ucase:  stats.companyStats.find(c=>c.company==='Uppercase')?.avg,
    nasher: stats.companyStats.find(c=>c.company==='Nasher Miles')?.avg,
  };
  STATE.history    = [...STATE.history.slice(-9), snap];
  STATE.curr       = stats;
  STATE.lastRefresh= now;
  STATE.running    = false;
  render();

  STATE.insightLoading = true;
  render();
  STATE.insight = await fetchInsight(stats.companyStats);
  STATE.insightLoading = false;
  render();
}

// MARGIN INTELLIGENCE TAB
// Data lives in localStorage (key: ldi_margin_data) — no server, no D1, no database.
// On first visit the data is seeded from MARGIN_SEED defaults in this file.
// When new quarterly results drop, update via the built-in editor (pencil icon).
// The function is async: fetches from API → classifies → renders.
// ─────────────────────────────────────────────────────────────────────────────

// ── Order that companies appear (matches COL key order) ──
const COMPANY_ORDER = ['VIP Group','Safari Industries','Samsonite Group','HRX','Uppercase','Nasher Miles'];

// ── Classification: core logic (pure function, takes one margin record + live avg) ──
//
// Decision framework — two primary axes:
//
//   1. Discount intensity  (live discount off MRP)
//        heavy     >= 50%
//        moderate  30–50%
//        light     < 30%
//
//   2. Margin direction    (oldest vs newest gross margin in the trend)
//        compressing  >= +3 pts drop  (newest < oldest by 3+ pts)
//        stable       within ±3 pts
//        expanding    >= +3 pts gain
//
//   Modifier — profit health (revenue growth + EBITDA):
//        severe   EBITDA negative AND revenue declining
//        healthy  revenue growing >10% AND EBITDA positive
//        mixed    everything else
//
// The 8 signals come from this matrix:
//
//                | Compressing                        | Stable             | Expanding
//   Heavy disc.  | severe → 🔻 Liquidation            | 📣 Marketing Tactic | 💪 Pricing Power
//                | healthy → 📈 Growth Push           |                    |
//                | mixed → 🟠 Margin Distress         |                    |
//   Moderate     | ⚠️ Margin Watch                    | ⚖️ Selective Promoter | ⚖️ Selective Promoter
//   Light        | ⚖️ Selective Promoter (rare)       | 🏆 Premium Hold (if GM≥55) / ⚖️ Selective | 🏆 Premium Hold / ⚖️ Selective
//
function classifyMargin(m, liveDiscount) {
  const qMargins = (() => { try { return JSON.parse(m.quarterlyGrossMargins || '[]'); } catch(e) { return []; } })();
  const compressionPts = qMargins.length >= 2 ? +(qMargins[0].gm - qMargins[qMargins.length-1].gm).toFixed(1) : 0;

  // Margin direction (≥3 pts threshold to count as a real move, not noise)
  const marginDirection = qMargins.length < 2 ? 'unknown'
    : compressionPts >=  3 ? 'compressing'
    : compressionPts <= -3 ? 'expanding'
    : 'stable';

  // Discount intensity
  const discountBand = liveDiscount == null ? 'unknown'
    : liveDiscount >= 50 ? 'heavy'
    : liveDiscount >= 30 ? 'moderate'
    : 'light';

  // Profit-health modifier (refines the heavy+compressing cell)
  const profitHealth = (m.ebitdaMargin < 0 && m.revenueGrowth <= 0) ? 'severe'
    : (m.revenueGrowth > 10 && m.ebitdaMargin > 0)               ? 'healthy'
    : 'mixed';

  let signal, signalColor, signalBg, interpretation, actionNote;

  if (liveDiscount == null) {
    signal = '⚪ No Live Data'; signalColor = '#9b9a96'; signalBg = '#f7f6f3';
    interpretation = 'Run a refresh from the dashboard to fetch live discount data. Margin data from filings is always available below.';
    actionNote = 'Fetch live data first to unlock the full analysis.';
  }
  // ── HEAVY DISCOUNT × COMPRESSING MARGIN — split by profit health ──
  else if (discountBand === 'heavy' && marginDirection === 'compressing' && profitHealth === 'severe') {
    signal = '🔻 Liquidation Signal'; signalColor = '#991b1b'; signalBg = '#FEE2E2';
    interpretation = `Heavy discounting (${liveDiscount}% off MRP) AND gross margins compressed ${compressionPts} pts AND revenue declining (${m.revenueGrowth}% YoY) AND EBITDA negative (${m.ebitdaMargin}%). The discount is consuming real margin — distress-driven clearance, not a marketing tactic.`;
    actionNote = 'Flag for further diligence. Inventory liquidation likely. Demand weakness confirmed by revenue decline.';
  }
  else if (discountBand === 'heavy' && marginDirection === 'compressing' && profitHealth === 'healthy') {
    signal = '📈 Growth Push'; signalColor = '#5b21b6'; signalBg = '#F3E8FF';
    interpretation = `Heavy discounting (${liveDiscount}%) is fuelling strong revenue growth (${m.revenueGrowth}% YoY). Gross margins are compressing -${compressionPts} pts as a deliberate investment in market share. Classic growth-phase playbook — accept margin compression now to capture topline.`;
    actionNote = 'Healthy if trajectory leads to breakeven. Watch for the inflection point where discounting normalises.';
  }
  else if (discountBand === 'heavy' && marginDirection === 'compressing') {
    signal = '🟠 Margin Distress'; signalColor = '#c05621'; signalBg = '#FFFAF0';
    interpretation = `Heavy discounting (${liveDiscount}%) AND gross margin compression (${compressionPts} pts) over ${qMargins.length} periods. Revenue ${m.revenueGrowth >= 0 ? '+' + m.revenueGrowth : m.revenueGrowth}% YoY — discounting is not generating volume recovery. The discount is eating into real margin.`;
    actionNote = 'Watch for further deterioration. If margins keep compressing or EBITDA flips negative, this escalates to a liquidation signal.';
  }
  // ── HEAVY DISCOUNT × STABLE MARGIN — the textbook marketing tactic ──
  else if (discountBand === 'heavy' && marginDirection === 'stable') {
    signal = '📣 Marketing Tactic'; signalColor = '#1a5c42'; signalBg = '#E1F5EE';
    interpretation = `Heavy discounting (${liveDiscount}% off MRP) BUT gross margins steady at ${m.grossMargin}% over ${qMargins.length} periods (no material compression). The brand sets elevated MRPs as anchors then discounts to drive e-commerce velocity — margin is intact. Deliberate channel strategy, not distress.`;
    actionNote = 'No margin concern currently. Monitor whether discounting accelerates or if gross margins begin slipping.';
  }
  // ── HEAVY DISCOUNT × EXPANDING MARGIN — exceptional ──
  else if (discountBand === 'heavy' && marginDirection === 'expanding') {
    signal = '💪 Pricing Power'; signalColor = '#0F6E56'; signalBg = '#D5EFE6';
    interpretation = `Heavy discounting (${liveDiscount}%) AND gross margins expanding +${Math.abs(compressionPts)} pts. The brand is improving cost structure faster than discounting can erode it — exceptional pricing power and operating leverage.`;
    actionNote = 'Strongest position. Discounting is purely promotional, not margin-destructive.';
  }
  // ── MODERATE DISCOUNT × COMPRESSING MARGIN ──
  else if (discountBand === 'moderate' && marginDirection === 'compressing') {
    signal = '⚠️ Margin Watch'; signalColor = '#b45309'; signalBg = '#FEF3C7';
    interpretation = `Moderate discounting (${liveDiscount}%) AND gross margin compression (${compressionPts} pts). ${m.grossMargin < 45 ? 'Gross margin already thin at ' + m.grossMargin + '% — limited buffer.' : 'Margin still healthy at ' + m.grossMargin + '% but the trend is the wrong direction.'} If discounting deepens, this escalates to distress.`;
    actionNote = 'Elevated watch. Track next quarter’s margin print and any change in discount intensity.';
  }
  // ── LIGHT DISCOUNT × HIGH-GM × NOT COMPRESSING — premium hold ──
  else if (discountBand === 'light' && m.grossMargin >= 55 && marginDirection !== 'compressing') {
    signal = '🏆 Premium Hold'; signalColor = '#2a6011'; signalBg = '#EAF3DE';
    interpretation = `Low discounting (${liveDiscount}%) with gross margins at ${m.grossMargin}% — well above sector. Premium positioning intact, pricing power preserved.`;
    actionNote = 'Strongest margin position in the sector. Pricing power intact.';
  }
  // ── EVERYTHING ELSE — moderate / light with stable or expanding margins ──
  else {
    signal = '⚖️ Selective Promoter'; signalColor = '#7a4a00'; signalBg = '#FFF7E6';
    const trendNote = marginDirection === 'expanding' ? `expanding +${Math.abs(compressionPts)} pts`
                    : marginDirection === 'compressing' ? `compressing -${compressionPts} pts (driver other than discounting)`
                    : 'stable';
    interpretation = `${discountBand === 'light' ? 'Low' : 'Moderate'} discounting (${liveDiscount}%) with gross margins ${trendNote} at ${m.grossMargin}%. Targeted promotional activity without a systemic margin problem.`;
    actionNote = 'Stable positioning. Not a red flag, but monitor for escalation.';
  }

  // ── Realized gross margin (vs MRP) ──
  // Gross margin % is on net sales (post-discount), discount % is off MRP — different denominators.
  // Convert both onto the MRP base: realizedGM = grossMargin * (1 - discount).
  // This is the gross profit the brand captures per ₹100 of headline MRP.
  // Example: GM=60% on net sales, discount=50% → realizedGM = 60% × 50% = 30% of MRP.
  const realizedGM      = liveDiscount != null ? Math.round(m.grossMargin * (1 - liveDiscount/100) * 10) / 10 : null;
  const realizedGMLabel = realizedGM == null ? '—'
    : realizedGM >= 30 ? `${realizedGM}% of MRP (strong)`
    : realizedGM >= 20 ? `${realizedGM}% of MRP (healthy)`
    : realizedGM >= 12 ? `${realizedGM}% of MRP (watch)`
    : realizedGM >= 6  ? `${realizedGM}% of MRP (thin)`
    : `${realizedGM}% of MRP (danger)`;
  const realizedGMColor = realizedGM == null ? '#9b9a96'
    : realizedGM >= 30 ? '#2a6011'
    : realizedGM >= 20 ? '#3B6D11'
    : realizedGM >= 12 ? '#7a4a00'
    : realizedGM >= 6  ? '#c05621'
    : '#991b1b';

  return { signal, signalColor, signalBg, interpretation, actionNote,
           realizedGM, realizedGMLabel, realizedGMColor, marginCompressing, compressionPts, qMargins };
}

// ── Parse the quarterly margins textarea back into JSON ──
function parseQMTextarea(raw) {
  return raw.trim().split('\n').filter(l => l.trim()).map(line => {
    const m = line.match(/^(.+?):\s*(-?\d+(?:\.\d+)?)%?$/);
    if (!m) return null;
    return { q: m[1].trim(), gm: parseFloat(m[2]) };
  }).filter(Boolean);
}

// ── Save updated margin record to localStorage ──
async function saveMarginRecord(recordId) {
  const btn = document.getElementById('me-save-btn');
  const errEl = document.getElementById('me-error');
  btn.disabled = true; btn.textContent = 'Saving…';
  errEl.style.display = 'none';

  const qmParsed = parseQMTextarea(document.getElementById('me-qm').value);
  if (qmParsed.length === 0) {
    errEl.textContent = 'Quarterly gross margins: enter at least one line in the format "Q1 FY26: 47%"';
    errEl.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Save & Update';
    return;
  }

  const payload = {
    grossMargin:      parseFloat(document.getElementById('me-gm').value),
    grossMarginPrev:  parseFloat(document.getElementById('me-gmprev').value),
    ebitdaMargin:     parseFloat(document.getElementById('me-ebitda').value),
    ebitdaMarginPrev: parseFloat(document.getElementById('me-ebitdaprev').value),
    netMargin:        parseFloat(document.getElementById('me-net').value),
    revenue:          parseFloat(document.getElementById('me-rev').value),
    revenueGrowth:    parseFloat(document.getElementById('me-revg').value),
    period:           document.getElementById('me-period').value.trim(),
    source:           document.getElementById('me-source').value.trim(),
    sourceUrl:        document.getElementById('me-sourceurl').value.trim(),
    quarterlyGrossMargins: JSON.stringify(qmParsed),
    notes:            document.getElementById('me-notes').value.trim(),
    isEstimated:      document.getElementById('me-estimated').checked,
    lastUpdated:      new Date().toISOString().slice(0,10),
  };

  // Validate: all numeric fields must be finite
  for (const [k,v] of Object.entries(payload)) {
    if (['grossMargin','grossMarginPrev','ebitdaMargin','ebitdaMarginPrev','netMargin','revenue','revenueGrowth'].includes(k) && !isFinite(v)) {
      errEl.textContent = `"${k}" must be a valid number.`;
      errEl.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Save & Update';
      return;
    }
  }

  try {
    // Save to localStorage — no server call needed
    const updated = lsPatchMargin(recordId, payload);
    if (!updated) throw new Error('Record not found in local storage');
    // Update in-memory cache
    const idx = (STATE._marginRecords || []).findIndex(r => r.id === recordId);

// MARGIN DATA — localStorage layer (replaces Table API / D1 database)
// Key: 'ldi_margin_data'  Value: JSON array of company records
// No server, no D1, no deployment dependency — works offline too.

const LS_KEY = 'ldi_margin_data';
const LS_VERSION_KEY = 'ldi_margin_seed_version';
// Bump this whenever MARGIN_SEED changes so users with cached data pick up the new figures.
// 2026-04-29: refreshed Samsonite to FY2025; corrected Uppercase/Nasher Miles revenue labels;
// reframed grossMarginPrev/ebitdaMarginPrev as YoY comparables.
const MARGIN_SEED_VERSION = 2;

function lsGetMargins() {
  try {
    const storedVersion = parseInt(localStorage.getItem(LS_VERSION_KEY) || '0', 10);
    if (storedVersion < MARGIN_SEED_VERSION) return []; // force re-seed on stale cache
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return [];
    const parsed = JSON.parse(raw);
    return Array.isArray(parsed) ? parsed : [];
  } catch(e) { return []; }
}

function lsSaveMargins(records) {
  try {
    localStorage.setItem(LS_KEY, JSON.stringify(records));
    localStorage.setItem(LS_VERSION_KEY, String(MARGIN_SEED_VERSION));
  } catch(e) {}
}

function lsPatchMargin(recordId, payload) {
  const records = lsGetMargins();
  const idx = records.findIndex(r => r.id === recordId);
  if (idx !== -1) records[idx] = { ...records[idx], ...payload };
  lsSaveMargins(records);
  return records[idx] || null;
}

        <li>Each brand: Firecrawl scrapes 2 listing pages (Amazon.in + Flipkart category/search pages)</li>
        <li>MRP and selling price extracted from the same listing page you click through to</li>
        <li>Discount % = (MRP − Selling) ÷ MRP × 100 — pure arithmetic from real page data</li>
        <li>Product links open the exact page that was scraped for that price</li>
        <li>Run history tracked in memory — trend chart builds across refreshes</li>
        <li>Today's date: ${TODAY}</li>
      </ul>
    </div>
  </div>`;
}

// ─────────────────────────────────────────────────────────────────────────────
// ─────────────────────────────────────────────────────────────────────────────
// EXCEL EXPORT
// Generates a multi-sheet .xlsx from whatever is currently in STATE.
// Sheet 1: Company Summary  |  Sheet 2: Brand Summary
// Sheet 3: All SKUs (raw)   |  Sheet 4: Trend History  |  Sheet 5: Margin Intel
// ─────────────────────────────────────────────────────────────────────────────
function downloadDashboardExcel() {
  if (typeof XLSX === 'undefined') {
    alert('Excel library not loaded — please check your internet connection and reload the page.');
    return;
  }

  const curr    = STATE.curr;
  const history = STATE.history || [];
  const margins = STATE._marginRecords || [];
  const ts      = STATE.lastRefresh ? new Date(STATE.lastRefresh)
                                       .toLocaleString('en-IN', { day:'numeric', month:'short',
                                                                   year:'numeric', hour:'2-digit',
                                                                   minute:'2-digit' })
                                     : 'No live data yet';

  // ── helper: array-of-arrays → worksheet, auto column widths ──
  function makeSheet(rows) {
    const ws = XLSX.utils.aoa_to_sheet(rows);
    // Auto-width: compute max char length per column
    const colWidths = [];
    rows.forEach(row => {
      (row || []).forEach((cell, i) => {
        const len = String(cell ?? '').length;
        colWidths[i] = Math.min(60, Math.max(colWidths[i] || 10, len));
      });
    });
    ws['!cols'] = colWidths.map(w => ({ wch: w }));
    return ws;
  }

  const wb = XLSX.utils.book_new();

  // ── META row prepended to each sheet ──
  const meta = [`Indian Luggage Discount Intelligence — Scraped: ${ts} — Date: ${TODAY}`];

  // ══════════════════════════════════════════════════════════
  // SHEET 1 — Company Summary
  // ══════════════════════════════════════════════════════════
  {
    const header = ['Company', 'Avg Discount %', 'Median %', 'Min %', 'Max %',
                    'P25 %', 'P75 %', 'Spread (Max−Min)', 'SKU Count',
                    'Tier <₹2k Avg %', 'Tier ₹2–6k Avg %', 'Tier >₹6k Avg %'];
    const rows   = [meta, [], header];
    if (curr) {
      curr.companyStats.forEach(c => rows.push([
        c.company, c.avg, c.median, c.min, c.max,
        c.p25, c.p75,
        +(c.max - c.min).toFixed(1),
        c.count,
        c.tierAvg?.['<₹2k']  ?? '—',
        c.tierAvg?.['₹2–6k'] ?? '—',
        c.tierAvg?.['>₹6k']  ?? '—',
      ]));
    } else {
      rows.push(['No live data yet — run a refresh first']);
    }
    XLSX.utils.book_append_sheet(wb, makeSheet(rows), '1. Company Summary');
  }

  // ══════════════════════════════════════════════════════════
  // SHEET 2 — Brand Summary
  // ══════════════════════════════════════════════════════════
  {
    const header = ['Brand', 'Parent Company', 'Avg Discount %', 'Median %',
                    'Min %', 'Max %', 'SKU Count', 'Amazon SKUs', 'Flipkart SKUs'];
    const rows   = [meta, [], header];
    if (curr) {
      curr.brandStats.forEach(b => rows.push([
        b.brand, b.company, b.avg, b.median, b.min, b.max,
        b.count, b.amazon, b.flipkart,
      ]));
    } else {
      rows.push(['No live data yet — run a refresh first']);
    }
    XLSX.utils.book_append_sheet(wb, makeSheet(rows), '2. Brand Summary');
  }

  // ══════════════════════════════════════════════════════════
  // SHEET 3 — All SKUs (raw product-level data)
  // ══════════════════════════════════════════════════════════
  {
    const header = ['Product Name', 'Brand', 'Company', 'Platform',
                    'MRP (₹)', 'Selling Price (₹)', 'Discount %', 'Price Tier'];
    const rows   = [meta, [], header];
    if (curr) {
      // Flatten all SKUs from brandStats
      const allSkus = curr.brandStats.flatMap(b => b.skus || []);
      allSkus.forEach(s => rows.push([
        s.name, s.brand, s.company, s.platform,
        s.mrp, s.selling, s.discount, s.tier,
      ]));
      if (!allSkus.length) rows.push(['No SKUs found']);
    } else {
      rows.push(['No live data yet — run a refresh first']);
    }
    XLSX.utils.book_append_sheet(wb, makeSheet(rows), '3. All SKUs');
  }

  // ══════════════════════════════════════════════════════════
  // SHEET 4 — Trend History (one row per refresh run)
  // ══════════════════════════════════════════════════════════
  {
    const header = ['Run', 'Time', 'Total SKUs',
                    'VIP Group Avg %', 'Safari Avg %', 'Samsonite Avg %',
                    'HRX Avg %', 'Uppercase Avg %', 'Nasher Miles Avg %'];
    const rows   = [meta, [], header];
    if (history.length) {
      history.forEach((h, i) => rows.push([
        i + 1,
        new Date(h.ts).toLocaleString('en-IN'),
        h.skuCount,
        h.vip    ?? '—',
        h.safari ?? '—',
        h.sam    ?? '—',
        h.hrx    ?? '—',
        h.ucase  ?? '—',
        h.nasher ?? '—',
      ]));
    } else {
      rows.push(['No history yet — each refresh adds a row here']);
    }
    XLSX.utils.book_append_sheet(wb, makeSheet(rows), '4. Trend History');
  }

  // ══════════════════════════════════════════════════════════
  // SHEET 5 — Margin Intelligence (from DB)
  // ══════════════════════════════════════════════════════════
  {
    // Read from localStorage (no server call)
    let recs = margins;
    if (!recs.length) recs = lsGetMargins();
    if (!recs.length) recs = MARGIN_SEED;

    // Live discounts for realized GM calc (GM × (1 − discount), unit-consistent on MRP base)
    const liveMap = {};
    if (curr) curr.companyStats.forEach(c => { liveMap[c.company] = c.avg; });

    const header = ['Company', 'Ticker', 'Period', 'Source',
                    'Gross Margin %', 'Gross Margin Prior %', 'EBITDA Margin %', 'EBITDA Margin Prior %',
                    'Net Margin %', 'Revenue (Cr/M)', 'Revenue Growth %',
                    'Live Discount %', 'Realized GM (% of MRP)',
                    'Data Type', 'Last Updated', 'Notes'];
    const rows = [meta, [], header];
    if (recs.length) {
      recs.forEach(r => {
        const live       = liveMap[r.company] ?? null;
        const realizedGM = live != null ? Math.round(r.grossMargin * (1 - live/100) * 10) / 10 : '—';
        rows.push([
          r.company, r.ticker, r.period, r.source,
          r.grossMargin, r.grossMarginPrev, r.ebitdaMargin, r.ebitdaMarginPrev,
          r.netMargin, r.revenue, r.revenueGrowth,
          live ?? '—', realizedGM,
          r.isEstimated ? 'ESTIMATED' : 'AUDITED',
          r.lastUpdated, r.notes,
        ]);
      });
    } else {
      rows.push(['No margin data in database yet']);
    }
    XLSX.utils.book_append_sheet(wb, makeSheet(rows), '5. Margin Intelligence');
  }

  // ── Step 1: build the file bytes ──────────────────────────────────────────
  const dateStr  = new Date().toISOString().slice(0, 10);
  const fileName = `Luggage_Discount_Intelligence_${dateStr}.xlsx`;
  const mimeType = 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet';
  const wbArr    = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });

  // ── Step 2: detect iframe context ──────────────────────────────────────────
  const isEmbedded = (function() {
    try { return window.self !== window.top; } catch(e) { return true; }
  })();

  if (!isEmbedded) {
    // ── STANDALONE: normal blob download ─────────────────────────────────────
    const blob    = new Blob([wbArr], { type: mimeType });
    const blobUrl = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = blobUrl; a.download = fileName; a.style.display = 'none';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(blobUrl), 10000);

  } else {
    // ── EMBEDDED IN IFRAME: postMessage bridge ────────────────────────────────
    // Convert Uint8Array → base64 so it survives postMessage across origins
    let binary = '';
    const bytes = new Uint8Array(wbArr);
    const chunkSize = 8192;
    for (let i = 0; i < bytes.length; i += chunkSize) {
      binary += String.fromCharCode(...bytes.subarray(i, i + chunkSize));
    }
    const base64Data = btoa(binary);

    // Send to parent window
    window.parent.postMessage(
      { type: 'DOWNLOAD_XLSX', fileName, mimeType, base64Data },
      '*'
    );

    // ── Fallback: if parent doesn't respond in 1 s, open in new tab ──────────
    const fallbackTimer = setTimeout(() => {
      // Parent didn't handle it — show a clear message with new-tab option
      const overlay = document.createElement('div');
      overlay.id = 'xlsx-fallback-overlay';
      overlay.style.cssText = [
        'position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:99999',
        'display:flex;align-items:center;justify-content:center'
      ].join(';');
      overlay.innerHTML = `
        <div style="background:#fff;border-radius:16px;padding:32px 28px;max-width:420px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)">
          <div style="font-size:32px;margin-bottom:12px">📊</div>
          <div style="font-size:17px;font-weight:700;margin-bottom:8px">Open in Full Page to Export</div>
          <div style="font-size:13px;color:#6b6b68;line-height:1.6;margin-bottom:20px">
            Excel export must be done in full page view.<br>
            Click below to open the dashboard in a new tab, then click Export Excel.
          </div>
          <a href="${window.location.href}" target="_blank" rel="noopener"
             style="display:inline-block;background:#BA7517;color:#fff;font-weight:700;font-size:14px;padding:12px 28px;border-radius:10px;text-decoration:none;margin-bottom:12px">
            ↗ Open Full Dashboard
          </a>
          <br>
          <button onclick="document.getElementById('xlsx-fallback-overlay').remove()"
            style="font-size:12px;color:#9b9a96;background:none;border:none;cursor:pointer;margin-top:4px">Dismiss</button>
        </div>`;
      document.body.appendChild(overlay);
      overlay.addEventListener('click', e => { if(e.target===overlay) overlay.remove(); });
    }, 1000);

    // If parent acknowledges, cancel the fallback
    function onParentAck(e) {
      if (e.data && e.data.type === 'DOWNLOAD_XLSX_ACK') {
        clearTimeout(fallbackTimer);
        window.removeEventListener('message', onParentAck);
      }
    }
    window.addEventListener('message', onParentAck);
  }
}

</script>

<!-- ── Parent-window postMessage listener ────────────────────────────────────
     If this page is opened standalone (not in an iframe), this script listens
     for DOWNLOAD_XLSX messages from any embedded child iframe and triggers the
     file download on the parent side where sandbox restrictions don't apply.
     REQUIRED iframe attributes for direct-in-iframe download (if you control
     the parent page HTML):
       sandbox="allow-scripts allow-same-origin allow-forms allow-downloads
                allow-popups allow-popups-to-escape-sandbox"
──────────────────────────────────────────────────────────────────────────── -->
<script>
(function() {
  // Only attach on the TOP-LEVEL window (i.e. the parent/host page)
  if (window.self !== window.top) return;
  window.addEventListener('message', function(e) {
    if (!e.data || e.data.type !== 'DOWNLOAD_XLSX') return;
    try {
      const { fileName, mimeType, base64Data } = e.data;
      // Convert base64 → Uint8Array
      const bin  = atob(base64Data);
      const arr  = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
      const blob    = new Blob([arr], { type: mimeType });
      const blobUrl = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = blobUrl; a.download = fileName; a.style.display = 'none';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(blobUrl), 10000);
      // Acknowledge back to the iframe so it cancels the fallback timer
      e.source.postMessage({ type: 'DOWNLOAD_XLSX_ACK' }, '*');
    } catch(err) {
      console.warn('DOWNLOAD_XLSX handler error:', err);
    }
  });
})();
</script>
